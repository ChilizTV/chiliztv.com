name: Integration tests

on:
  push:
    branches:
      - main
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

concurrency:
  group: ci-integration-main
  # Do not cancel a nightly run that may have started before a push run.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Foundry artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            apps/smart-contracts/chiliz-tv/cache
            apps/smart-contracts/chiliz-tv/out
          key: foundry-${{ runner.os }}-${{ hashFiles('apps/smart-contracts/chiliz-tv/foundry.toml', 'apps/smart-contracts/chiliz-tv/src/**/*.sol') }}
          restore-keys: foundry-${{ runner.os }}-

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        run: supabase start

      - name: Export Supabase local credentials
        # `supabase status -o env` prints DB_URL, API_URL, ANON_KEY, SERVICE_ROLE_KEY.
        run: |
          STATUS=$(supabase status -o env)
          echo "$STATUS"
          SUPABASE_DB_URL=$(echo "$STATUS" | grep -E '^DB_URL=' | sed 's/^DB_URL=//;s/^"//;s/"$//')
          SUPABASE_API_URL=$(echo "$STATUS" | grep -E '^API_URL=' | sed 's/^API_URL=//;s/^"//;s/"$//')
          SUPABASE_ANON_KEY=$(echo "$STATUS" | grep -E '^ANON_KEY=' | sed 's/^ANON_KEY=//;s/^"//;s/"$//')
          SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | grep -E '^SERVICE_ROLE_KEY=' | sed 's/^SERVICE_ROLE_KEY=//;s/^"//;s/"$//')
          {
            echo "SUPABASE_DB_URL=$SUPABASE_DB_URL"
            echo "DATABASE_URL=$SUPABASE_DB_URL"
            echo "SUPABASE_URL=$SUPABASE_API_URL"
            echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Run integration tests
        # Runbook: apps/backend/docs/SMOKE_integration.md
        run: pnpm --filter @chiliztv.com/backend test:integration
        env:
          NODE_ENV: test

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop

# Fly.io config — chiliztv-workers (production)
# Deployed only by release.yml on tag vX.Y.Z.

app = "chiliztv-workers"
primary_region = "cdg"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  PROCESS_ROLE = "worker"

[http_service]
  internal_port = 3001
  force_https = true
  # Workers run the BlockchainEventListener + JobScheduler continuously.
  # Auto-stop would let the indexer fall behind silently — keep the machine
  # always-on. `min_machines_running=1` is the safety net; `auto_stop` off
  # prevents Fly from suspending on the idle HTTP timer.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

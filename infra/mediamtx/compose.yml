services:
  mediamtx:
    # ffmpeg variant: Alpine-based, includes ca-certificates so MediaMTX can
    # validate the Let's Encrypt cert when calling https://api.chiliztv.com.
    # The bare `:latest` image is `scratch`-based and has no CA bundle.
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    # host networking is required: MediaMTX exposes several listeners (RTMP 1935,
    # HLS 8888, API 9997) and NAT introduces latency on the RTMP ingest.
    # UFW on the host firewalls everything that doesn't need to be public.
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    environment:
      MTX_LOGLEVEL: info
      # MediaMTX does NOT expand ${VAR} inside the YAML config. We override the
      # secret-bearing fields via env vars instead — docker compose substitutes
      # ${MEDIAMTX_PUBLISH_SECRET} from .env at container start, so MediaMTX
      # receives the resolved value already.
      MTX_AUTHMETHOD: http
      MTX_AUTHHTTPADDRESS: "https://api.chiliztv.com/mediamtx/auth?secret=${MEDIAMTX_PUBLISH_SECRET}"
      # `$$MTX_PATH` escapes docker-compose interpolation so MediaMTX sees the
      # literal `$MTX_PATH` and substitutes it at exec time with the actual path.
      # `wget` (not `curl`) because bluenviron/mediamtx:latest-ffmpeg is Alpine
      # + BusyBox and does not ship curl. BusyBox wget supports HTTPS via its
      # built-in TLS and `--post-data` for POST requests.
      MTX_PATHS_ALL_RUNONREADY: 'wget -q --post-data="" -O /dev/null "https://api.chiliztv.com/mediamtx/connect?path=$$MTX_PATH&secret=${MEDIAMTX_PUBLISH_SECRET}"'
      MTX_PATHS_ALL_RUNONNOTREADY: 'wget -q --post-data="" -O /dev/null "https://api.chiliztv.com/mediamtx/disconnect?path=$$MTX_PATH&secret=${MEDIAMTX_PUBLISH_SECRET}"'

volumes:
  mediamtx-recordings:

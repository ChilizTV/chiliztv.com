# MediaMTX config — chiliztv beta
# Reference: https://github.com/bluenviron/mediamtx#configuration
#
# Env substitution is enabled — values like ${VAR} are expanded from the .env
# file loaded by docker compose. Backend webhook URLs and the publish secret
# come from there.

logLevel: info
logDestinations: [stdout]
logFile: ''

# RTMP ingest (OBS streamers push here)
rtmp: yes
rtmpAddress: :1935

# HLS playback (browser viewers fetch here, fronted by Caddy in HTTPS)
#
# `fmp4` variant for Safari/iOS compatibility (lowLatency uses parts whose
# durations drift, breaking native HLS).
#
# `hlsSegmentDuration` MUST be longer than OBS's keyframe interval (default
# ~2-8s depending on the rate-control). 6s is a safe upper bound — if a stream
# only emits keyframes every 4-5s, MediaMTX still produces clean segments.
# `hlsSegmentCount: 3` keeps the warm-up short (~18s of buffered footage
# before the playlist becomes available).
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 6s
hlsPartDuration: 1s

# Admin API (port restricted in the host firewall, never proxied through Caddy)
api: yes
apiAddress: :9997

# Auth + path hooks are configured via MTX_* env vars in compose.yml because
# MediaMTX does not perform ${VAR} substitution inside this YAML file. See
# compose.yml: MTX_AUTHMETHOD, MTX_AUTHHTTPADDRESS,
# MTX_PATHS_ALL_RUNONREADY, MTX_PATHS_ALL_RUNONNOTREADY.

paths:
  # Catch-all path — any stream key that isn't pre-declared lands here.
  # runOnReady / runOnNotReady are injected via env override (see comment above).
  all:
    runOnReadyRestart: no
